application:
  name: invento

spring:
  profiles:
    active: \@activatedProperties\@
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  jpa:
    hibernate:
      ddl-auto: none

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging.level.org.hibernate.SQL: DEBUG