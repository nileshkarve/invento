databaseChangeLog:
  - changeSet:
      id: create-table-product
      author: Nilesh
      context: dev,test,prod

      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: ${UUID}
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_product
                    nullable: false

              - column:
                  name: name
                  type: ${LONG_STRING}
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: ${LONG_STRING}
                  constraints:
                    nullable: true

              - column:
                  name: mrp
                  type: ${AMOUNT}
                  constraints:
                    nullable: false

              - column:
                  name: category_id
                  type: ${UUID}
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: ${STATUS}
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: product
            baseColumnNames: category_id
            referencedTableName: product_category
            referencedColumnNames: id
            constraintName: fk_product_category

        - createIndex:
            tableName: product
            indexName: idx_product_category_id
            columns:
              - column:
                  name: category_id