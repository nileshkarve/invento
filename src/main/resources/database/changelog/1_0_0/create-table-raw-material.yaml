databaseChangeLog:
  - changeSet:
      id: create-table-raw_material
      author: Nilesh
      context: dev,test,prod

      changes:
        - createTable:
            tableName: raw_material
            columns:
              - column:
                  name: id
                  type: ${UUID}
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_raw_material
                    nullable: false

              - column:
                  name: name
                  type: ${LONG_STRING}
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: ${LONG_STRING}
                  constraints:
                    nullable: true

              - column:
                  name: measuring_unit
                  type: ${SHORT_CODE}
                  constraints:
                    nullable: false

              - column:
                  name: firm_id
                  type: ${UUID}
                  constraints:
                    nullable: false

              - column:
                  name: raw_material_type
                  type: ${CODE}
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: ${STATUS}
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: raw_material
            baseColumnNames: firm_id
            referencedTableName: firm
            referencedColumnNames: id
            constraintName: fk_raw_material_firm

        - createIndex:
            tableName: raw_material
            indexName: idx_raw_material_firm_id
            columns:
              - column:
                  name: firm_id