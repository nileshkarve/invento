databaseChangeLog:
  - changeSet:
      id: create-table-firm
      author: Nilesh
      context: dev,test,prod

      changes:
        - createTable:
            tableName: firm
            columns:
              - column:
                  name: id
                  type: ${UUID}
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_firm
                    nullable: false

              - column:
                  name: name
                  type: ${LONG_STRING}
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: ${STATUS}
                  constraints:
                    nullable: false

        - createIndex:
            tableName: firm
            indexName: idx_firm_name
            columns:
              - column:
                  name: name