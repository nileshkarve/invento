databaseChangeLog:
  - changeSet:
      id: create-table-product_category
      author: Nilesh
      context: dev,test,prod

      changes:
        - createTable:
            tableName: product_category
            columns:
              - column:
                  name: id
                  type: ${UUID}
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_product_category
                    nullable: false

              - column:
                  name: name
                  type: ${STRING}
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: ${LONG_STRING}
                  constraints:
                    nullable: true

              - column:
                  name: firm_id
                  type: ${UUID}
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: ${STATUS}
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: product_category
            columnNames: firm_id,name
            constraintName: uk_product_category_firm_name

        - addForeignKeyConstraint:
            baseTableName: product_category
            baseColumnNames: firm_id
            referencedTableName: firm
            referencedColumnNames: id
            constraintName: fk_product_category_firm

        - createIndex:
            tableName: product_category
            indexName: idx_product_category_firm_id
            columns:
              - column:
                  name: firm_id